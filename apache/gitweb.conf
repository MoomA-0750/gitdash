Alias /gitweb /var/www/git
<Directory /var/www/git>
    Options +ExecCGI
    AddHandler cgi-script .cgi
    DirectoryIndex gitweb.cgi
    AllowOverride None
    Require all granted
</Directory>

# gitdash Node.js アプリへのリバースプロキシ
# 要件: mod_proxy, mod_proxy_http が有効であること
# 確認: httpd -M | grep proxy
ProxyPreserveHost On
ProxyPass /gitdash http://127.0.0.1:5987/gitdash
ProxyPassReverse /gitdash http://127.0.0.1:5987/gitdash

ScriptAlias /git/public/ /usr/libexec/git-core/git-http-backend/
<Location /git/public/>
    SetEnv GIT_PROJECT_ROOT /var/lib/git/public
    SetEnv GIT_HTTP_EXPORT_ALL
    Require all granted
</Location>

ScriptAlias /git/private/ /usr/libexec/git-core/git-http-backend/
<Location /git/private/>
    SetEnv GIT_PROJECT_ROOT /var/lib/git/private
    SetEnv GIT_HTTP_EXPORT_ALL
    AuthType Basic
    AuthName "Git Private Repository"
    AuthUserFile /etc/httpd/.htpasswd
    Require valid-user
</Location>
