<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Dashboard</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

<!-- ログインモーダル -->
<div id="login-modal">
  <div class="modal-box">
    <h2>🔐 ログイン</h2>
    <div id="login-error" class="modal-error" style="display:none"></div>
    <input type="text" id="login-user" placeholder="ユーザー名" autocomplete="username">
    <input type="password" id="login-pass" placeholder="パスワード" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn btn-link" onclick="closeLogin()">キャンセル（パブリックのみ表示）</button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h1>Git Dashboard</h1>
      <button class="btn-create-repo" id="btn-create-repo" onclick="showCreateRepo()" title="新規リポジトリ作成" style="display:none">＋</button>
    </div>
    <div class="user-bar" id="user-bar">
      <span id="user-label">未ログイン</span>
      <button class="btn-login" onclick="showLogin()">ログイン</button>
    </div>
  </div>

  <div class="sidebar-repos">
    <div class="section-label">Public</div>
    <div id="repo-list-public"><div class="loading" style="padding:8px;font-size:12px;">Loading...</div></div>

    <div id="private-section" style="display:none">
      <div class="section-label">Private</div>
      <div id="repo-list-private"></div>
    </div>

    <div id="shared-section" style="display:none">
      <div class="section-label section-label-shared">Shared</div>
      <div id="repo-list-shared"></div>
    </div>
  </div>
</div>

<div id="main">
  <div class="tabs">
    <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="tab" onclick="showTab('commits')">Commits</div>
    <div class="tab" onclick="showTab('files')">Files</div>
    <div class="tab" onclick="showTab('diff')">Diff</div>
  </div>
  <div id="content"><div class="loading">リポジトリを選択してください</div></div>
</div>

<!-- リポジトリ作成モーダル -->
<div id="create-repo-modal">
  <div class="modal-box">
    <h2>📦 新規リポジトリ</h2>
    <div id="create-repo-error" class="modal-error" style="display:none"></div>
    <input type="text" id="create-repo-name" placeholder="リポジトリ名（例: my-project）">
    <textarea id="create-repo-desc" placeholder="説明（任意）" rows="3"></textarea>
    <div class="radio-group">
      <label class="radio-label">
        <input type="radio" name="create-repo-vis" value="public" checked>
        <span class="badge badge-public">public</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="create-repo-vis" value="private">
        <span class="badge badge-private">private</span>
      </label>
    </div>
    <button class="btn btn-primary" onclick="doCreateRepo()">作成</button>
    <div style="text-align:center;margin-top:8px;">
      <button class="btn btn-link" onclick="closeCreateRepo()">キャンセル</button>
    </div>
  </div>
</div>

<script>window.BASE_PATH = '__BASE_PATH__';</script>
<script src="static/app.js"></script>
</body>
</html>
